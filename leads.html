<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leads - Kera</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h2 class="mb-4">Collected Leads</h2>
    <table class="table table-bordered table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Mobile</th>
                <th>State</th>
                <th>Loan Amount</th>
                <th>EMI</th>
                <th>Created At</th>
            </tr>
        </thead>
        <tbody>
            {% for lead in leads %}
            <tr>
                <td>{{ lead[0] }}</td>
                <td>{{ lead[1] }}</td>
                <td>{{ lead[2] }}</td>
                <td>{{ lead[3] }}</td>
                <td>{{ lead[4] }}</td>
                <td>{{ lead[5] }}</td>
                <td>{{ lead[6] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
